<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adversarial Co-Evolution Control Deck</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <!-- Sidebar Controls -->
        <aside class="controls">
            <header>
                <h1><i class="fa-solid fa-atom"></i> Control Deck</h1>
                <div id="connection-status" style="width: 10px; height: 10px; background: red; border-radius: 50%;"
                    title="Backend Disconnected"></div>
            </header>

            <!-- PPO Training Card -->
            <div class="card">
                <h2><i class="fa-solid fa-brain"></i> Train Agent</h2>
                <form onsubmit="runScript(event, 'ppo_train.py')">
                    <div class="form-group">
                        <label>Timesteps</label>
                        <input type="number" name="--timesteps" value="10000" step="1000">
                    </div>
                    <div class="form-group">
                        <label>Environment Count</label>
                        <input type="number" name="--num-env" value="4">
                    </div>
                    <div class="form-group">
                        <label>Reward System</label>
                        <select name="--reward-system">
                            <option value="long">Long-Term (Sparse)</option>
                            <option value="short" selected>Short-Term (Dense)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Evaluator</label>
                        <select name="--evaluator">
                            <option value="none">None (Standard)</option>
                            <option value="expert">Expert Heuristic</option>
                            <option value="llm">LLM (Distributed)</option>
                        </select>
                    </div>
                    <!-- New Hyperparameters -->
                    <div class="form-group">
                        <label>Learning Rate</label>
                        <input type="number" name="--learning-rate" value="0.0001" step="0.00001">
                    </div>
                    <div class="form-group">
                        <label>Batch Size</label>
                        <input type="number" name="--batch-size" value="1024">
                    </div>
                    <div class="form-group">
                        <label>Entropy Coef</label>
                        <input type="number" name="--ent-coef" value="0.01" step="0.001">
                    </div>
                    <button type="submit" class="btn btn-primary">Start Training</button>
                </form>
            </div>

            <!-- Master Server Card -->
            <div class="card">
                <h2><i class="fa-solid fa-server"></i> LLM Master Node</h2>
                <form onsubmit="runScript(event, 'model_server.py')">
                    <div class="form-group">
                        <label>Status: <span id="master-status">Inactive</span></label>
                    </div>
                    <button type="submit" class="btn btn-primary" style="background: #8b5cf6;">Start Master</button>
                </form>
            </div>

            <!-- Worker Node Card -->
            <div class="card">
                <h2><i class="fa-solid fa-microchip"></i> Start Worker</h2>
                <form onsubmit="runScript(event, 'model_worker.py')">
                    <div class="form-group">
                        <label>Type</label>
                        <select name="--type">
                            <option value="fast">Fast (Action/Eval)</option>
                            <option value="slow">Slow (Enhancer)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Model ID</label>
                        <select name="--model">
                            <option value="llama-3b">Llama 3.2 (3B)</option>
                            <option value="llama-70b">Llama 3.1 (70B)</option>
                            <option value="llama-3.1-70b">Llama 3.1 (70B Instruct)</option>
                            <option value="gpt-oss-20b">GPT-OSS (20B)</option>
                            <option value="gemma3-27b">Gemma 3 (27B)</option>
                            <option value="qwen3-32b">Qwen 3 (32B)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="background: #10b981;">Spawn Worker</button>
                </form>
            </div>

            <!-- Play UI Card -->
            <div class="card">
                <h2><i class="fa-solid fa-gamepad"></i> Play Game</h2>
                <form onsubmit="runScript(event, 'game/play_ui.py')">
                    <div class="form-group">
                        <label>Model Path</label>
                        <input type="text" name="--model" value="./artifacts/models/ppo_gin_rummy/best_model.zip">
                    </div>
                    <div class="form-group">
                        <label>Human ID</label>
                        <select name="--human-id">
                            <option value="0">0 (First Turn)</option>
                            <option value="1">1 (Second Turn)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="background: #f59e0b;">Launch Game</button>
                </form>
            </div>

            <!-- Prompt Editor Card -->
            <div class="card">
                <h2><i class="fa-solid fa-pen-nib"></i> Prompt Editor</h2>
                <form onsubmit="savePrompt(event)">
                    <div class="form-group">
                        <label>System Prompt</label>
                        <textarea id="prompt-content" rows="6"
                            style="width: 100%; background: rgba(0,0,0,0.2); color:white; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 5px; font-family: monospace;"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="background: #ec4899;">Save Prompt</button>
                </form>
            </div>

        </aside>

        <!-- Main Content -->
        <main class="main-panel">

            <!-- Active Processes Bar -->
            <div id="active-processes" class="process-list">
                <!-- Badges injected here -->
                <div style="color: #64748b; padding: 0.5rem;">No active processes</div>
            </div>

            <!-- Log Terminal -->
            <div id="terminal" class="terminal-window">
                <div class="log-line system">Welcome to Control Deck v1.0</div>
                <div class="log-line">Select a task on the left to begin...</div>
            </div>

        </main>
    </div>

    <script>
        let currentSocket = null;
        let selectedProcessId = null;

        // --- API Calls ---

        async function runScript(event, scriptName) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const args = {};

            for (let [key, value] of formData.entries()) {
                args[key] = value;
            }

            try {
                const res = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script_name: scriptName, args: args })
                });
                const data = await res.json();

                if (res.ok) {
                    logSystem(`Started ${scriptName} (ID: ${data.process_id})`);
                    updateStatus();
                    selectProcess(data.process_id);
                } else {
                    logError(`Failed to start: ${data.detail}`);
                }
            } catch (e) {
                logError(`Request Error: ${e}`);
            }
        }

        async function stopProcess(id, event) {
            if (event) event.stopPropagation();
            if (!confirm("Terminate this process?")) return;

            await fetch(`/api/stop/${id}`, { method: 'POST' });
            updateStatus();
            updateStatus();
        }

        // --- Prompt Handling ---

        async function loadPrompt() {
            try {
                const res = await fetch('/api/prompt');
                const data = await res.json();
                document.getElementById('prompt-content').value = data.content;
            } catch (e) { console.error("Failed to load prompt", e); }
        }

        async function savePrompt(event) {
            event.preventDefault();
            const content = document.getElementById('prompt-content').value;
            try {
                const res = await fetch('/api/prompt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content })
                });
                if (res.ok) alert("Prompt Saved!");
            } catch (e) { alert("Error saving prompt"); }
        }

        // Init
        loadPrompt();

        async function clearProcess(id, event) {
            if (event) event.stopPropagation();
            await fetch(`/api/process/${id}`, { method: 'DELETE' });
            if (selectedProcessId === id) {
                document.getElementById('terminal').innerHTML = ''; // Clear logs
                selectedProcessId = null;
            }
            updateStatus();
        }

        async function updateStatus() {
            const res = await fetch('/api/status');
            const processes = await res.json();

            const container = document.getElementById('active-processes');
            container.innerHTML = '';

            if (processes.length === 0) {
                container.innerHTML = '<div style="color: #64748b; padding: 0.5rem;">No active processes</div>';
                return;
            }

            processes.forEach(p => {
                const isSelected = p.id === selectedProcessId ? 'selected' : '';
                const isStopped = p.status.startsWith('stopped');
                const statusClass = isStopped ? 'stopped' : '';

                // Build Badge
                const badge = document.createElement('div');
                badge.className = `process-badge ${isSelected} ${statusClass}`;
                badge.onclick = () => selectProcess(p.id);

                // Icon based on name
                let icon = 'fa-cog';
                if (p.name.includes('train')) icon = 'fa-brain';
                if (p.name.includes('server')) icon = 'fa-server';
                if (p.name.includes('worker')) icon = 'fa-microchip';
                if (p.name.includes('game')) icon = 'fa-gamepad';

                badge.innerHTML = `
                <i class="fa-solid ${icon}"></i> 
                <span>${p.name} <small>(${p.id})</small></span>
            `;

                // Stop/Clear Button
                if (!isStopped) {
                    badge.innerHTML += `
                    <button class="btn btn-stop" onclick="stopProcess('${p.id}', event)">
                        <i class="fa-solid fa-stop"></i>
                    </button>
                `;
                } else {
                    badge.innerHTML += `
                    <button class="btn btn-stop" style="border-color: #64748b; color: #64748b;" onclick="clearProcess('${p.id}', event)">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                `;
                }

                container.appendChild(badge);
            });

            // Update Connection Status Indicator
            document.getElementById('connection-status').style.background = '#10b981'; // Green
        }

        // --- Logging & WebSocket ---

        function selectProcess(id) {
            if (selectedProcessId === id) return;
            selectedProcessId = id;

            // Update UI selection
            updateStatus(); // Re-render badges

            // Clear terminal
            const term = document.getElementById('terminal');
            term.innerHTML = '';
            logSystem(`Switching logs to process ${id}...`);

            // Close old socket
            if (currentSocket) {
                currentSocket.close();
            }

            // Open new socket
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            const wsUrl = `${protocol}://${window.location.host}/ws/logs/${id}`;

            currentSocket = new WebSocket(wsUrl);

            currentSocket.onmessage = function (event) {
                const line = document.createElement('div');
                line.className = 'log-line';
                line.textContent = event.data;
                if (event.data.includes('[SYSTEM]')) line.classList.add('system');

                term.appendChild(line);
                term.scrollTop = term.scrollHeight; // Auto-scroll
            };

            currentSocket.onclose = function () {
                logSystem("Log stream disconnected.");
            };
        }

        function logSystem(msg) {
            const term = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'log-line system';
            line.textContent = `[SYSTEM] ${msg}`;
            term.appendChild(line);
            term.scrollTop = term.scrollHeight;
        }

        function logError(msg) {
            const term = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = 'log-line error';
            line.textContent = `[ERROR] ${msg}`;
            term.appendChild(line);
        }

        // Poll status occasionally
        setInterval(updateStatus, 3000);
        updateStatus(); // Init

    </script>

</body>

</html>
